<style>
  :root {
    --pitch:    #0A3D1F;
    --turf:     #0F5132;
    --lime:     #AAFF3C;
    --white:    #F5F7F2;
    --grey:     #8A9B82;
    --dark:     #07200F;
    --card:     #0D2918;
    --border:   rgba(170,255,60,0.15);
    --match:    #27AE60;
    --nomatch:  #C0392B;
    --double:   #8E44AD;
    --under:    #E67E22;
    --handicap: #2980B9;
    --low:      #16A085;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--pitch);
    border-bottom: 2px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--lime);
    line-height: 1;
  }
  .logo span { color: var(--white); }

  .tagline {
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── Controls ── */
  .controls {
    padding: 20px;
    background: var(--pitch);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .date-bar {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--lime);
  }

  .select-wrap {
    position: relative;
  }

  select {
    width: 100%;
    background: var(--card);
    color: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 40px 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--lime); }

  .select-arrow {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--lime);
    pointer-events: none;
    font-size: 12px;
  }

  .run-btn {
    background: var(--lime);
    color: var(--dark);
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
  }
  .run-btn:active { transform: scale(0.98); opacity: 0.9; }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Status / Loading ── */
  #status {
    padding: 16px 20px;
    min-height: 48px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--grey);
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--lime);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
    display: none;
  }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty / Error states ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--grey);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; color: var(--white); margin-bottom: 6px; }
  .empty p { font-size: 14px; line-height: 1.5; }

  /* ── Match Cards ── */
  #results { padding: 12px 16px 32px; display: flex; flex-direction: column; gap: 12px; }

  .league-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--lime);
    padding: 8px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .match-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--turf);
    border-bottom: 1px solid var(--border);
  }
  .match-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--lime);
    letter-spacing: 0.5px;
  }
  .match-teams {
    text-align: right;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .match-teams .vs { color: var(--grey); font-weight: 400; margin: 0 6px; }

  /* Result rows */
  .result-section {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .result-section:last-child { border-bottom: none; }

  .result-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-label::before {
    content: '';
    display: block;
    width: 3px;
    height: 10px;
    background: var(--lime);
    border-radius: 2px;
  }
  .result-label.rev::before { background: var(--under); }

  .result-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .pill-label {
    font-size: 10px;
    font-weight: 400;
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pill.match    { background: rgba(39,174,96,0.2);  color: #6EE7A0; border: 1px solid rgba(39,174,96,0.4); }
  .pill.nomatch  { background: rgba(192,57,43,0.2);  color: #F1948A; border: 1px solid rgba(192,57,43,0.4); }
  .pill.double   { background: rgba(142,68,173,0.2); color: #D7A9F0; border: 1px solid rgba(142,68,173,0.4); }
  .pill.under    { background: rgba(230,126,34,0.2); color: #F0B27A; border: 1px solid rgba(230,126,34,0.4); }
  .pill.handicap { background: rgba(41,128,185,0.2); color: #85C1E9; border: 1px solid rgba(41,128,185,0.4); }
  .pill.low      { background: rgba(22,160,133,0.2); color: #76D7C4; border: 1px solid rgba(22,160,133,0.4); }
  .pill.neutral  { background: rgba(138,155,130,0.15); color: var(--grey); border: 1px solid rgba(138,155,130,0.2); }
  .pill.empty    { background: transparent; color: var(--grey); border: 1px dashed rgba(138,155,130,0.2); font-style: italic; font-weight: 400; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--grey);
    border-top: 1px solid var(--border);
  }

  /* ── Desktop ── */
  @media(min-width:640px) {
    .controls { flex-direction: row; align-items: flex-end; flex-wrap: wrap; }
    .select-wrap { flex: 1; min-width: 260px; }
    .run-btn { width: auto; padding: 13px 28px; flex-shrink: 0; }
    #results { padding: 16px 24px 40px; }
  }
</style>
</head>

  ["Turkiye - 3. Lig Group 2", "turkey6"],
  ["Turkiye - 3. Lig Group 3", "turkey7"],
  ["Turkiye - 3. Lig Group 4", "turkey8"],
  ["Turkiye - Super Lig", "turkey"],
  ["UAE - Pro League", "uae"],
  ["USA - MLS", "usa"],
  ["USA - NWSL", "usa6"],
  ["USA - USL Championship", "usa2"],
  ["USA - USL League One", "usa3"],
  ["USA - USL Super League", "usa7"],
  ["Ukraine - Persha Liga", "ukraine2"],
  ["Ukraine - Premier League", "ukraine"],
  ["Ukraine - U19 League", "ukraine5"],
  ["Uruguay - Liga AUF - Apertura", "uruguay"],
  ["Uruguay - Liga AUF - Clausura", "uruguay3"],
  ["Uruguay - Liga AUF - Intermediate", "uruguay2"],
  ["Venezuela - Liga FUTVE - Apertura", "venezuela"],
  ["Venezuela - Liga FUTVE - Clausura", "venezuela2"],
  ["Vietnam - National League Women", "vietnam3"],
  ["Vietnam - V League", "vietnam"],
  ["Wales - Cymru Premier", "wales"],
];

// ── Backend API URL (update after deploying backend) ─────────
const API_BASE = "https://kickwise-v2.onrender.com";

// ── Populate dropdown ────────────────────────────────────────
const sel = document.getElementById("leagueSelect");
LEAGUES.forEach(([name, code]) => {
  const opt = document.createElement("option");
  opt.value = code;
  opt.textContent = name;
  if (code === "belarus") opt.selected = true;
  sel.appendChild(opt);
});

// ── Date display ─────────────────────────────────────────────
const dateBar = document.getElementById("dateBar");
dateBar.textContent = new Date().toLocaleDateString("en-GB", {
  weekday:"long", day:"numeric", month:"long", year:"numeric"
});

// ── Pill renderer ─────────────────────────────────────────────
function pillClass(val) {
  if (!val || val.trim() === "" || val === "None" || val === "N/A") return "empty";
  val = val.toLowerCase();
  if (val.includes("not match")) return "nomatch";
  if (val === "match")           return "match";
  if (val.includes("double"))    return "double";
  if (val.includes("under"))     return "under";
  if (val.includes("handicap"))  return "handicap";
  if (val.includes("low"))       return "low";
  return "neutral";
}

function pill(label, val) {
  const cls   = pillClass(val);
  const text  = (!val || val.trim() === "" || val === "None") ? "—" : val;
  return `<div class="pill ${cls}"><span class="pill-label">${label}</span>${text}</div>`;
}

// ── Status helpers ────────────────────────────────────────────
function setStatus(msg, loading=false) {
  document.getElementById("statusText").textContent = msg;
  document.getElementById("spinner").classList.toggle("active", loading);
}

// ── Main analysis call ────────────────────────────────────────
async function runAnalysis() {
  const code = sel.value;
  const name = sel.options[sel.selectedIndex].text;
  const btn  = document.getElementById("runBtn");
  const res  = document.getElementById("results");

  btn.disabled = true;
  res.innerHTML = "";

  const today = new Date();
  const todayStr = `${today.getDate()} ${today.toLocaleString('en-US', {month:'short'})}`;

  setStatus(`Fetching ${name} fixtures…`, true);

  try {
    const resp = await fetch(`${API_BASE}/fixtures?league=${code}&date=${encodeURIComponent(todayStr)}`);
    if (!resp.ok) throw new Error(`Server error: ${resp.status}`);
    const data = await resp.json();

    if (!data.matches || data.matches.length === 0) {
      setStatus("Done");
      res.innerHTML = `
        <div class="empty">
          <div class="icon">📅</div>
          <h3>No fixtures today</h3>
          <p>No matches found for ${name} today.<br>Try a different league.</p>
        </div>`;
      btn.disabled = false;
      return;
    }

    res.innerHTML = `<div class="league-header">⚽ ${name}</div>`;

    data.matches.forEach((m, i) => {
      const card = document.createElement("div");
      card.className = "match-card";
      card.style.animationDelay = `${i * 60}ms`;
      card.innerHTML = `
        <div class="match-header">
          <span class="match-time">${m.time || "TBD"}</span>
          <span class="match-teams">${m.home} <span class="vs">vs</span> ${m.away}</span>
        </div>
        <div class="result-section">
          <div class="result-label">Normal</div>
          <div class="result-pills" id="normal-${i}">
            <div class="pill neutral">⏳ Calculating…</div>
          </div>
        </div>
        <div class="result-section">
          <div class="result-label rev">Reversed · ${m.away} vs ${m.home}</div>
          <div class="result-pills" id="reversed-${i}">
            <div class="pill neutral">⏳ Calculating…</div>
          </div>
        </div>
        <div class="result-section" id="smart-${i}"></div>`;
      res.appendChild(card);
    });

    for (let i = 0; i < data.matches.length; i++) {
      const m = data.matches[i];
      setStatus(`Calculating ${i + 1} of ${data.matches.length}: ${m.home} vs ${m.away}…`, true);

      try {
        const purl = `${API_BASE}/predict?league=${code}&home=${encodeURIComponent(m.home)}&away=${encodeURIComponent(m.away)}`;
        const presp = await fetch(purl);
        if (!presp.ok) throw new Error(`Server error: ${presp.status}`);
        const p = await presp.json();

        document.getElementById(`normal-${i}`).innerHTML =
          pill("D69", p.d70) + pill("B120", p.b120) + pill("C120", p.c120) +
          pill("B46", p.b46) + pill("D64", p.d64) + pill("B118", p.b118) + pill("AA15", p.aa15);
        document.getElementById(`reversed-${i}`).innerHTML =
          pill("D69", p.d70r) + pill("B120", p.b120r) + pill("C120", p.c120r) +
          pill("B46", p.b46r) + pill("D64", p.d64r) + pill("B118", p.b118r) + pill("AA15", p.aa15r);

        // ── Smart prediction logic ─────────────────────────────
        const smartDiv = document.getElementById(`smart-${i}`);
        const isMatch = (v) => {
          const s = (v || "").toLowerCase().trim();
          return s === "match" || (s.includes("match") && !s.includes("not"));
        };
        const c120Match = isMatch(p.c120) || isMatch(p.c120r);

        // Use D69 from whichever direction has C120 = "match"
        const d70Main = isMatch(p.c120) ? (p.d70 || "") : (p.d70r || p.d70 || "");

        const d64Both   = (p.d64 || "").toLowerCase().includes("both") ||
                          (p.d64r || "").toLowerCase().includes("both");
        const d64One    = (p.d64 || "").toLowerCase().includes("one") ||
                          (p.d64r || "").toLowerCase().includes("one");
        const b120Combined = ((p.b120 || "") + " " + (p.b120r || "")).toLowerCase();
        const b120Double = b120Combined.includes("double");
        const b120Under  = b120Combined.includes("under");

        // B46 — extract just the goals part (e.g. "3goals", "4goals")
        const b46Combined = ((p.b46 || "") + " " + (p.b46r || "")).toLowerCase();
        const b46Goals = (() => {
          const m = b46Combined.match(/(\d+goals)/);
          return m ? m[1] : "";
        })();

        // AA15 — valid when either says "yes", "yes1", or "both"
        const aa15Valid = (v) => {
          const s = (v || "").toLowerCase();
          return s === "yes" || s === "yes1" || s === "both";
        };
        const aa15Ok = aa15Valid(p.aa15) || aa15Valid(p.aa15r);

        let smartResult = null;

        if (c120Match) {
          const labels = [];
          let cls = "neutral";

          if (b120Double) {
            labels.push(d64Both ? "double" : (d64One ? "2-handicap" : null));
          }
          if (b120Under) {
            labels.push(d64Both ? "under" : (d64One ? "under extend" : null));
          }
          const validLabels = labels.filter(Boolean);

          if (validLabels.length > 0) {
            const lbl = validLabels.join(" + ");
            cls = lbl.includes("double") ? "double" : (lbl.includes("handicap") ? "handicap" : "under");

            // Add B46 goals only when AA15 is valid AND b46 has a goals value
            const goalsSuffix = (aa15Ok && b46Goals) ? " / " + b46Goals : "";
            smartResult = { label: d70Main + " / " + lbl + goalsSuffix, cls: cls };
          }
        }

        if (smartResult) {
          smartDiv.innerHTML = `
            <div style="margin-top:4px">
              <div class="result-label" style="color:var(--lime);margin-bottom:6px">⚡ PREDICTION</div>
              <div class="pill ${smartResult.cls}" style="font-size:14px;padding:8px 14px;font-weight:700">
                ${smartResult.label}
              </div>
            </div>`;
        } else {
          smartDiv.innerHTML = "";
        }
      } catch (e) {
        document.getElementById(`normal-${i}`).innerHTML = `<div class="pill empty">Error</div>`;
        document.getElementById(`reversed-${i}`).innerHTML = `<div class="pill empty">Error</div>`;
      }
    }

    setStatus(`Done — ${data.matches.length} match${data.matches.length > 1 ? "es" : ""}`);

  } catch (err) {
    setStatus("Error — see below");
    res.innerHTML = `
      <div class="empty">
        <div class="icon">⚠️</div>
        <h3>Could not load data</h3>
        <p>${err.message}<br><br>The backend may be starting up.<br>Wait 30 seconds and try again.</p>
      </div>`;
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
